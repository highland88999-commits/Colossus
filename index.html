<!DOCTYPE html>
<html lang="en" spellcheck="false" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>OLYMPUS COLOSSEUM</title>
    <meta property="og:title" content="OLYMPUS COLOSSEUM | Nexus Vortex" />
    <meta property="og:description" content="[STATION_IDENTIFIED: NEXUS_VORTEX] :: Initializing Colossus Environment. Secure connection established. Accessing decentralized vaults and neon-realms." />
    <meta name="description" content="Secure gateway to the Artemis Nexus. Initialize connection to deploy the Colossus environment." />
    <style>
        :root { 
            --p: #bc13fe; 
            --g: #39ff14; 
            --cyber-blue: #00f3ff;
            --panel-bg: rgba(10, 10, 12, 0.55); 
            --bloom: 0 0 20px rgba(188, 19, 254, 0.25), inset 0 0 15px rgba(0, 243, 255, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        body { user-select: none; -webkit-user-select: none; }

        /* Video Layering */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; overflow: hidden; pointer-events: none;
        }

        video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            transition: opacity 1.2s ease;
        }
        
        #landing-video { z-index: 10; opacity: 1; }
        #bg-video { z-index: 5; opacity: 0; filter: brightness(0.6); }

        /* Multi-Stage Landing Gate */
        #landing-gate {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.8s ease;
        }
        
        .gate-btn {
            padding: 25px 60px; border: 2px solid var(--g); 
            color: var(--g); background: rgba(0,0,0,0.9); 
            cursor: pointer; letter-spacing: 10px; font-weight: bold;
            font-size: 1.5rem; text-shadow: 0 0 15px var(--g);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.3);
            text-transform: uppercase;
            transition: 0.3s;
        }
        .gate-btn:hover { background: var(--g); color: #000; box-shadow: 0 0 50px var(--g); }
        #btn-stage-2 { display: none; border-color: var(--p); color: var(--p); text-shadow: 0 0 15px var(--p); box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }

        /* Main UI Wrapper */
        #ui-wrapper {
            position: fixed; inset: 0; z-index: 50; display: none; 
            flex-direction: column; padding: 3mm; gap: 3mm; 
            opacity: 0; transition: opacity 1.5s ease; pointer-events: none; 
        }

        /* Immersive Top Holoframe */
        #holoframe {
            position: relative; flex: 1; 
            background: var(--panel-bg); border: 1px solid rgba(188, 19, 254, 0.4);
            box-shadow: var(--bloom); border-radius: 12px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column; overflow: hidden;
            pointer-events: auto; transition: all 0.4s ease;
        }

        #holoframe.maximized { position: fixed; inset: 0; z-index: 9999; border-radius: 0; border: none; }

        .frame-header {
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.6); border-bottom: 1px solid var(--p);
            color: var(--g); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
        }
        
        .header-controls { display: flex; gap: 15px; align-items: center; }
        .control-btn { cursor: pointer; font-weight: bold; padding: 3px 8px; border-radius: 4px; transition: 0.2s; }
        
        .btn-max { color: var(--cyber-blue); border: 1px solid var(--cyber-blue); }
        .btn-max:hover { background: var(--cyber-blue); color: #000; box-shadow: 0 0 10px var(--cyber-blue); }
        
        .btn-close { color: #ff3366; border: 1px solid #ff3366; }
        .btn-close:hover { background: #ff3366; color: #000; box-shadow: 0 0 10px #ff3366; }

        /* Viewport Content */
        #idle-video { flex: 1; width: 100%; height: 100%; object-fit: cover; }
        #nexus-iframe { flex: 1; border: none; width: 100%; height: 100%; background: transparent; display: none; }

        /* Navigation Dock */
        #dock {
            position: relative; width: 100%; height: 22vh; min-height: 180px; max-height: 250px;
            background: var(--panel-bg); border: 1px solid rgba(0, 243, 255, 0.4);
            box-shadow: var(--bloom); border-radius: 12px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: grid; grid-template-columns: repeat(4, 1fr); justify-items: center;
            align-content: start; gap: 12px 8px; padding: 15px;
            overflow-y: auto; overflow-x: hidden; pointer-events: auto;
            scrollbar-width: thin; scrollbar-color: var(--cyber-blue) transparent;
        }
        
        #dock::-webkit-scrollbar { width: 4px; }
        #dock::-webkit-scrollbar-thumb { background: var(--cyber-blue); border-radius: 10px; }

        /* Icons */
        .icon { 
            width: 55px; height: 55px; background: rgba(5, 5, 5, 0.7);
            border: 1.5px solid #333; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .icon svg { width: 28px; height: 28px; transition: 0.3s; }
        .icon:hover { transform: scale(1.1) translateY(-3px); border-color: inherit; }
        .icon:hover svg { filter: drop-shadow(0 0 8px currentColor); }

        /* Injector Modal */
        #injector-modal {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            justify-content: center; align-items: center; flex-direction: column;
        }
        .injector-box {
            background: var(--panel-bg); border: 2px solid var(--cyber-blue);
            padding: 30px; border-radius: 12px; box-shadow: var(--bloom);
            width: 90%; max-width: 420px; text-align: center;
        }
        .injector-box h2 { color: var(--g); margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        .tos-link {
            color: var(--cyber-blue); text-decoration: none;
            border-bottom: 1px dashed var(--cyber-blue); transition: 0.3s ease; font-weight: bold;
        }
        .tos-link:hover { color: #fff; text-shadow: 0 0 10px var(--cyber-blue); border-bottom-color: #fff; }
        .injector-input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #000; border: 1px solid var(--p); color: #fff;
            font-family: 'Courier New', monospace; border-radius: 6px;
        }
        .injector-input:focus { outline: none; box-shadow: 0 0 10px var(--p); }
        
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .injector-btn {
            width: 100%; padding: 12px; border: 1px solid; background: transparent; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-card { border-color: #bc13fe; color: #bc13fe; }
        .btn-card:hover:not(:disabled) { background: #bc13fe; color: #000; box-shadow: 0 0 15px #bc13fe; }
        .btn-crypto { border-color: #ffcc00; color: #ffcc00; }
        .btn-crypto:hover:not(:disabled) { background: #ffcc00; color: #000; box-shadow: 0 0 15px #ffcc00; }
        .cancel-btn { border-color: #ff3366; color: #ff3366; margin-top: 15px; grid-column: span 2; }
        .cancel-btn:hover { background: #ff3366; color: #000; box-shadow: 0 0 15px #ff3366; }
        .injector-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="landing-video" muted playsinline loop>
        <source src="https://www.dropbox.com/scl/fi/eq3c5xrlrqmsqs5poyl3u/Make_the_words_.mp4?rlkey=5p5pysbnhwt1lyq2et9blvgks&raw=1" type="video/mp4">
    </video>
    <video id="bg-video" muted playsinline loop>
        <source src="https://files.catbox.moe/871o13.mp4" type="video/mp4">
    </video>
</div>

<div id="landing-gate">
    <button id="btn-stage-1" class="gate-btn" onclick="stageOne()">Connect to Nexus</button>
    <button id="btn-stage-2" class="gate-btn" onclick="stageTwo()">Initialize Colossus</button>
</div>

<div id="ui-wrapper">
    <div id="holoframe">
        <div class="frame-header">
            <span id="mod-title">COLOSSUS_LINK :: IDLE</span>
            <div class="header-controls">
                <span class="control-btn btn-max" onclick="toggleMax()" id="max-btn">[ ] MAX</span>
                <span class="control-btn btn-close" onclick="closeGame()">[X] DISCONNECT</span>
            </div>
        </div>
        <video id="idle-video" muted playsinline loop autoplay>
            <source src="https://files.catbox.moe/u5yrfx.mp4" type="video/mp4">
        </video>
        <iframe id="nexus-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" allow="autoplay; fullscreen;"></iframe>
    </div>

    <div id="dock">
        <div class="icon" onclick="openInjector()" data-title="INJECT GAME [$2]" style="border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.3);">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>

        <div class="icon" onclick="launch('stake.html', 'STAKE_VAULT')" style="border-color: var(--cyber-blue); color: var(--cyber-blue);">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h18v18H3V3zm8 14h2v-2h-2v2zm2-4.5V13h-2v-1.5c0-1.1.9-2 2-2 .55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.86-1.28 3.41-3 3.86z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://neon-racer-ecru.vercel.app/', 'NEON_STAR_RACER')" style="border-color: #ff00ff; color: #ff00ff;">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://merlin-mandates.vercel.app/', 'MERLIN_MANDATES')" style="border-color: var(--p); color: var(--p);">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12h20c0-5.52-4.48-10-10-10zm-2 11h4v7h-4v-7z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://zeus-v-hades.vercel.app/', 'ZEUS_V_HADES')" style="border-color: var(--g); color: var(--g);">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-13h4v10h-4z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://starblood.vercel.app/', 'STARBLOOD')" style="border-color: #ff3366; color: #ff3366;">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.52 3.58 8.2 8 8.2s8-3.68 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 16c-2.21 0-4-1.79-4-4 0-2.05 1.5-4.22 4-6.5 2.5 2.28 4 4.45 4 6.5 0 2.21-1.79 4-4 4z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://olympian-chess.vercel.app/', 'OLYMPIAN_CHESS')" style="border-color: #ffcc00; color: #ffcc00;">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16h14v2H5zm14-9l-3 4-4-5-4 5-3-4v7h14v-7z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://raptor-rush.vercel.app/', 'RAPTOR_RUSH')" style="border-color: #00ffcc; color: #00ffcc;">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 2 4 8 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8c0-6-4-12-8-12z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://set-air-hockey.vercel.app/', 'SET_AIR_HOCKEY')" style="border-color: var(--g); color: var(--g);">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-10 10v4h20v-4a10 10 0 0 0-10-10zm0 2a8 8 0 0 1 7.93 7H4.07A8 8 0 0 1 12 4zm-8 9h16v1H4v-1z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://zeus-protocol-deep-space-defence.vercel.app/', 'ZEUS_PROTOCOL')" style="border-color: var(--cyber-blue); color: var(--cyber-blue);">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
        </div>
        <div class="icon" onclick="launch('https://prometheus-iota-livid.vercel.app/', 'PROMETHEUS')" style="border-color: #ff00ff; color: #ff00ff;">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 14h20v6H2zM4 12h16V4H4v8zm2-6h12v4H6V6z"/></svg>
        </div>
    </div>
</div>

<div id="injector-modal">
    <div class="injector-box">
        <h2>[ UPLINK_PROTOCOL ]</h2>
        <p style="color: #aaa; font-size: 0.8rem; margin-bottom: 20px; line-height: 1.4;">
            Procure digital real estate. $2.00 USD per node. Games only. No refunds.<br><br>
            By initializing connection, you accept the <br>
            <a href="https://colosseum-injection-policy.vercel.app" target="_blank" class="tos-link">Uplink Accord & Data Directive</a>.
        </p>
        <input type="text" id="inj-title" class="injector-input" placeholder="GAME TITLE (Max 15 chars)" maxlength="15">
        <input type="url" id="inj-url" class="injector-input" placeholder="https://your-game-url.com">
        
        <div class="payment-grid">
            <button class="injector-btn btn-card" onclick="initiatePayment('stripe')" id="btn-stripe">PAY $2.00 (CARD)</button>
            <button class="injector-btn btn-crypto" onclick="initiatePayment('nowpayments')" id="btn-crypto">PAY $2.00 (CRYPTO)</button>
            <button class="injector-btn cancel-btn" onclick="closeInjector()">Abort Connection</button>
        </div>
    </div>
</div>

<script>
    // --- UI LOGIC ---
    const landVid = document.getElementById('landing-video');
    const mainVid = document.getElementById('bg-video');
    const gate = document.getElementById('landing-gate');
    const uiWrapper = document.getElementById('ui-wrapper');

    function stageOne() {
        landVid.play();
        document.getElementById('btn-stage-1').style.display = 'none';
        document.getElementById('btn-stage-2').style.display = 'block';
        gate.style.background = 'rgba(0,0,0,0.2)';
    }

    function stageTwo() {
        mainVid.play();
        landVid.style.opacity = '0';
        mainVid.style.opacity = '1';
        gate.style.opacity = '0';

        setTimeout(() => {
            gate.style.display = 'none';
            landVid.pause(); 
            uiWrapper.style.display = 'flex';
            setTimeout(() => { uiWrapper.style.opacity = '1'; }, 50);
        }, 1200);
    }

    function launch(url, title) {
        const idleVid = document.getElementById('idle-video');
        const ifr = document.getElementById('nexus-iframe');
        document.getElementById('mod-title').innerText = "COLOSSUS_LINK :: " + title;
        idleVid.style.display = 'none';
        idleVid.pause();
        ifr.src = url;
        ifr.style.display = 'block';
    }

    function closeGame() {
        const idleVid = document.getElementById('idle-video');
        const ifr = document.getElementById('nexus-iframe');
        document.getElementById('mod-title').innerText = "COLOSSUS_LINK :: IDLE";
        ifr.src = ''; 
        ifr.style.display = 'none';
        idleVid.style.display = 'block';
        idleVid.play();
    }

    function toggleMax() {
        const hf = document.getElementById('holoframe');
        const btn = document.getElementById('max-btn');
        hf.classList.toggle('maximized');
        btn.innerText = hf.classList.contains('maximized') ? "[_] MIN" : "[ ] MAX";
    }

    // --- INJECTOR LOGIC ---
    function openInjector() { document.getElementById('injector-modal').style.display = 'flex'; }
    function closeInjector() { document.getElementById('injector-modal').style.display = 'none'; }

    function generateRandomIcon() {
        const shapes = [
            '<path d="M12 2l8.66 5v10L12 22l-8.66-5V7z"/>',
            '<path d="M12 2L2 22h20L12 2zM12 5.8L18.4 19H5.6z"/>',
            '<path d="M3 3h18v18H3V3zm16 16V5H5v14h14zM12 7l4 8H8l4-8z"/>',
            '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z"/>'
        ];
        return `<svg viewBox="0 0 24 24" fill="currentColor">${shapes[Math.floor(Math.random() * shapes.length)]}</svg>`;
    }

    async function initiatePayment(provider) {
        const title = document.getElementById('inj-title').value.trim();
        const url = document.getElementById('inj-url').value.trim();
        
        if(!title || !url.startsWith('http')) {
            alert("CRITICAL ERROR: Invalid Node Parameters. Require valid Title and HTTPS URL.");
            return;
        }

        const btnStripe = document.getElementById('btn-stripe');
        const btnCrypto = document.getElementById('btn-crypto');
        
        btnStripe.disabled = true;
        btnCrypto.disabled = true;
        
        if(provider === 'stripe') btnStripe.innerText = "LINKING...";
        if(provider === 'nowpayments') btnCrypto.innerText = "LINKING...";

        try {
            const response = await fetch('https://dtijetigjmdjgxqcputr.supabase.co/functions/v1/colossus-uplink', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, gameUrl: url, iconSvg: generateRandomIcon(), provider: provider })
            });

            const data = await response.json();

            if (data.error) {
                alert(`UPLINK REJECTED: ${data.error}`);
                resetButtons();
                return;
            }

            // Redirect to the dynamic Gateway URL
            window.location.href = data.checkoutUrl;

        } catch (err) {
            alert("Gateway Connection Failed. Try again.");
            resetButtons();
        }
    }

    function resetButtons() {
        const btnStripe = document.getElementById('btn-stripe');
        const btnCrypto = document.getElementById('btn-crypto');
        btnStripe.disabled = false; btnCrypto.disabled = false;
        btnStripe.innerText = "PAY $2.00 (CARD)";
        btnCrypto.innerText = "PAY $2.00 (CRYPTO)";
    }

    function renderCommunityNodes(nodes) {
        const dock = document.getElementById('dock');
        const colors = ['#00f3ff', '#ff00ff', '#39ff14', '#bc13fe', '#ffcc00'];
        
        nodes.forEach(node => {
            const color = colors[Math.floor(Math.random() * colors.length)];
            const div = document.createElement('div');
            div.className = 'icon';
            div.setAttribute('data-title', node.title);
            div.style.color = color;
            div.style.borderColor = color;
            div.onclick = () => launch(node.url, node.title);
            div.innerHTML = node.icon_svg;
            dock.appendChild(div);
        });
    }
</script>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    
    // Original Tracking Client
    const trackingUrl = 'https://ezfwzqxwafvdjtwnmyrx.supabase.co';
    const trackingKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6Znd6cXh3YWZ2ZGp0d25teXJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTA2NzIsImV4cCI6MjA5NzY2NjY3Mn0.baxnDWZ9rSZobzqnAOND7SuJpXbl4wmRyUYTQl4whPE';
    const trackingClient = createClient(trackingUrl, trackingKey);

    // New Injector Database Client
    const injectorUrl = 'https://dtijetigjmdjgxqcputr.supabase.co';
    const injectorAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0aWpldGlnam1kamd4cWNwdXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDM1NzAsImV4cCI6MjA5ODUxOTU3MH0.544Xz4efOddgfZ2Ym7FkjGYiTBqSEknqUKJ3zig0sMQ';
    const injectorClient = createClient(injectorUrl, injectorAnonKey);

    function getSafeVisitorId() {
        let id = localStorage.getItem('nexus_visitor_id');
        if (!id) {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                id = crypto.randomUUID();
            } else {
                id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }
            localStorage.setItem('nexus_visitor_id', id);
        }
        return id;
    }

    async function silentUplink() {
        try {
            const visitorId = getSafeVisitorId();
            await trackingClient.rpc('track_ping', { p_ip_hash: visitorId });
        } catch (error) {
            console.error("Colossus Node Telemetry Error:", error);
        }
    }

    window.addEventListener('load', async () => {
        silentUplink();
        setInterval(silentUplink, 60000); 

        // Fetch verified community real estate and append to dock
        try {
            const { data: nodes, error } = await injectorClient
                .from('community_nodes')
                .select('*')
                .eq('payment_status', true);

            if (!error && nodes && nodes.length > 0) {
                renderCommunityNodes(nodes);
            }
        } catch (err) {
            console.error("Failed to fetch community nodes.");
        }
    });
</script>
</body>
