<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Colossus | Artemis Nexus</title>
    <meta property="og:title" content="COLOSSUS OS | Nexus Vortex" />
    <meta property="og:description" content="[STATION_IDENTIFIED: NEXUS_VORTEX] :: Initializing Colossus Environment. Secure connection established. Accessing decentralized vaults and neon-realms." />
    <meta name="description" content="Secure gateway to the Artemis Nexus. Initialize connection to deploy the Colossus environment." />
    <style>
        :root { --p: #bc13fe; --g: #39ff14; --cyber-blue: #00f3ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        /* Video Layering */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; overflow: hidden;
        }

        video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            transition: opacity 1.2s ease;
        }
        
        #landing-video { z-index: 10; opacity: 1; }
        #bg-video { z-index: 5; opacity: 0; filter: brightness(0.5); }

        /* Multi-Stage Landing Gate */
        #landing-gate {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.8s ease;
        }
        
        .gate-btn {
            padding: 25px 60px; border: 2px solid var(--g); 
            color: var(--g); background: rgba(0,0,0,0.9); 
            cursor: pointer; letter-spacing: 10px; font-weight: bold;
            font-size: 1.5rem; text-shadow: 0 0 15px var(--g);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.3);
            text-transform: uppercase;
            transition: 0.3s;
        }
        .gate-btn:hover { background: var(--g); color: #000; box-shadow: 0 0 50px var(--g); }

        #btn-stage-2 { display: none; border-color: var(--p); color: var(--p); text-shadow: 0 0 15px var(--p); box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }

        /* Navigation Dock - Grid Layout (4 per row, vertical scroll) */
        #dock {
            position: fixed; 
            bottom: env(safe-area-inset-bottom, 20px);
            left: 50%; 
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px; /* Constrains width to keep 4 elements tight on desktop */
            max-height: 40vh; /* Triggers vertical scroll if items exceed 40% of screen height */
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            justify-items: center;
            gap: 15px 10px; 
            padding: 15px 20px;
            overflow-y: auto; 
            overflow-x: hidden;
            z-index: 1000; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 1.5s;
            
            /* Background optional: adds a subtle plate so scrolling looks clean */
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            backdrop-filter: blur(4px);
            
            /* Custom Vertical Scrollbar */
            scrollbar-width: thin;
            scrollbar-color: var(--p) transparent;
        }
        
        #dock::-webkit-scrollbar { width: 6px; }
        #dock::-webkit-scrollbar-track { background: transparent; }
        #dock::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }

        /* Independent Icons */
        .icon { 
            width: 65px; height: 65px; /* Slightly scaled to ensure 4 fit cleanly on mobile */
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid #333;
            border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }
        .icon svg { 
            width: 32px; height: 32px; 
            transition: 0.3s;
        }
        
        /* Hover Effects */
        .icon:hover { 
            transform: scale(1.15) translateY(-5px); 
            border-color: inherit;
        }
        .icon:hover svg {
            filter: drop-shadow(0 0 10px currentColor);
        }

        /* Hover border glow colors mapped directly */
        .icon[title="STAKE VAULT"]:hover { border-color: var(--cyber-blue); box-shadow: 0 10px 25px rgba(0, 243, 255, 0.4); }
        .icon[title="NEON RACER"]:hover { border-color: #ff00ff; box-shadow: 0 10px 25px rgba(255, 0, 255, 0.4); }
        .icon[title="MERLIN MANDATES"]:hover { border-color: var(--p); box-shadow: 0 10px 25px rgba(188, 19, 254, 0.4); }
        .icon[title="ZEUS V HADES"]:hover { border-color: var(--g); box-shadow: 0 10px 25px rgba(57, 255, 20, 0.4); }
        .icon[title="STARBLOOD"]:hover { border-color: #ff3366; box-shadow: 0 10px 25px rgba(255, 51, 102, 0.4); }
        .icon[title="OLYMPIAN CHESS"]:hover { border-color: #ffcc00; box-shadow: 0 10px 25px rgba(255, 204, 0, 0.4); }
        .icon[title="RAPTOR RUSH"]:hover { border-color: #00ffcc; box-shadow: 0 10px 25px rgba(0, 255, 204, 0.4); }
        .icon[title="AIR HOCKEY"]:hover { border-color: var(--g); box-shadow: 0 10px 25px rgba(57, 255, 20, 0.4); }
        .icon[title="ZEUS PROTOCOL"]:hover { border-color: var(--cyber-blue); box-shadow: 0 10px 25px rgba(0, 243, 255, 0.4); }
        .icon[title="PROMETHEUS"]:hover { border-color: #ff00ff; box-shadow: 0 10px 25px rgba(255, 0, 255, 0.4); }

        /* Immersive Iframe Frame */
        #holoframe {
            display: none; position: fixed; inset: 0; 
            background: #000; z-index: 5000; flex-direction: column;
        }
        .frame-header {
            padding: 15px 25px; display: flex; justify-content: space-between;
            background: #111; border-bottom: 1px solid var(--p);
            color: var(--g); font-size: 0.8rem; letter-spacing: 3px;
        }
        #nexus-iframe { flex: 1; border: none; width: 100%; height: 100%; background: #000; }
        .close-btn { cursor: pointer; color: #ff3366; font-weight: bold; border: 1px solid #ff3366; padding: 2px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="landing-video" muted playsinline loop>
        <source src="https://www.dropbox.com/scl/fi/eq3c5xrlrqmsqs5poyl3u/Make_the_words_.mp4?rlkey=5p5pysbnhwt1lyq2et9blvgks&raw=1" type="video/mp4">
    </video>

    <video id="bg-video" muted playsinline loop>
        <source src="https://www.dropbox.com/scl/fi/13paev0odpa61tpjpm9n2/Image_To_Video-9.mp4?rlkey=6a07rmjobwagvwaq9z3029ge8&raw=1" type="video/mp4">
    </video>
</div>

<div id="landing-gate">
    <button id="btn-stage-1" class="gate-btn" onclick="stageOne()">Connect to Nexus</button>
    <button id="btn-stage-2" class="gate-btn" onclick="stageTwo()">Initialize Colossus</button>
</div>

<div id="dock">
    <div class="icon" onclick="launch('stake.html', 'STAKE_VAULT')" title="STAKE VAULT" style="border-color: var(--cyber-blue); color: var(--cyber-blue);">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h18v18H3V3zm8 14h2v-2h-2v2zm2-4.5V13h-2v-1.5c0-1.1.9-2 2-2 .55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.86-1.28 3.41-3 3.86z"/></svg>
    </div>
    
    <div class="icon" onclick="launch('https://neon-racer-ecru.vercel.app/', 'NEON_STAR_RACER')" title="NEON RACER" style="border-color: #ff00ff; color: #ff00ff;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    
    <div class="icon" onclick="launch('https://merlin-mandates.vercel.app/', 'MERLIN_MANDATES')" title="MERLIN MANDATES" style="border-color: var(--p); color: var(--p);">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12h20c0-5.52-4.48-10-10-10zm-2 11h4v7h-4v-7z"/></svg>
    </div>
    
    <div class="icon" onclick="launch('https://zeus-v-hades.vercel.app/', 'ZEUS_V_HADES')" title="ZEUS V HADES" style="border-color: var(--g); color: var(--g);">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-13h4v10h-4z"/></svg>
    </div>

    <div class="icon" onclick="launch('https://starblood.vercel.app/', 'STARBLOOD')" title="STARBLOOD" style="border-color: #ff3366; color: #ff3366;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.52 3.58 8.2 8 8.2s8-3.68 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 16c-2.21 0-4-1.79-4-4 0-2.05 1.5-4.22 4-6.5 2.5 2.28 4 4.45 4 6.5 0 2.21-1.79 4-4 4z"/></svg>
    </div>

    <div class="icon" onclick="launch('https://olympian-chess.vercel.app/', 'OLYMPIAN_CHESS')" title="OLYMPIAN CHESS" style="border-color: #ffcc00; color: #ffcc00;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16h14v2H5zm14-9l-3 4-4-5-4 5-3-4v7h14v-7z"/></svg>
    </div>

    <div class="icon" onclick="launch('https://raptor-rush.vercel.app/', 'RAPTOR_RUSH')" title="RAPTOR RUSH" style="border-color: #00ffcc; color: #00ffcc;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 2 4 8 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8c0-6-4-12-8-12z"/></svg>
    </div>

    <div class="icon" onclick="launch('https://set-air-hockey.vercel.app/', 'SET_AIR_HOCKEY')" title="AIR HOCKEY" style="border-color: var(--g); color: var(--g);">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-10 10v4h20v-4a10 10 0 0 0-10-10zm0 2a8 8 0 0 1 7.93 7H4.07A8 8 0 0 1 12 4zm-8 9h16v1H4v-1z"/></svg>
    </div>

    <div class="icon" onclick="launch('https://zeus-protocol-deep-space-defence.vercel.app/', 'ZEUS_PROTOCOL')" title="ZEUS PROTOCOL" style="border-color: var(--cyber-blue); color: var(--cyber-blue);">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
    </div>

    <div class="icon" onclick="launch('https://prometheus-iota-livid.vercel.app/', 'PROMETHEUS')" title="PROMETHEUS" style="border-color: #ff00ff; color: #ff00ff;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 14h20v6H2zM4 12h16V4H4v8zm2-6h12v4H6V6z"/></svg>
    </div>
</div>

<div id="holoframe">
    <div class="frame-header">
        <span id="mod-title">COLOSSUS_OS // LINK_ACTIVE</span>
        <span class="close-btn" onclick="closeFrame()">DISCONNECT [X]</span>
    </div>
    <iframe id="nexus-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" allow="autoplay; fullscreen;"></iframe>
</div>

<script>
    const landVid = document.getElementById('landing-video');
    const mainVid = document.getElementById('bg-video');
    const gate = document.getElementById('landing-gate');

    // FIRST CLICK: Trigger landing video playback
    function stageOne() {
        landVid.play();
        document.getElementById('btn-stage-1').style.display = 'none';
        document.getElementById('btn-stage-2').style.display = 'block';
        gate.style.background = 'rgba(0,0,0,0.2)';
    }

    // SECOND CLICK: Deploy the main environment
    function stageTwo() {
        mainVid.play();
        
        // UI Visual Sequence
        landVid.style.opacity = '0';
        mainVid.style.opacity = '1';
        gate.style.opacity = '0';

        setTimeout(() => {
            gate.style.display = 'none';
            landVid.pause(); // Release memory
            document.getElementById('dock').style.opacity = '1';
            document.getElementById('dock').style.pointerEvents = 'auto';
        }, 1200);
    }

    function launch(url, title) {
        const hf = document.getElementById('holoframe');
        const ifr = document.getElementById('nexus-iframe');
        document.getElementById('mod-title').innerText = "COLOSSUS_LINK :: " + title;
        ifr.src = url;
        hf.style.display = 'flex';
    }

    function closeFrame() {
        const hf = document.getElementById('holoframe');
        const ifr = document.getElementById('nexus-iframe');
        hf.style.display = 'none';
        ifr.src = ''; // Unload to stop game audio
    }
</script>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const trackingUrl = 'https://ezfwzqxwafvdjtwnmyrx.supabase.co';
    const trackingKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6Znd6cXh3YWZ2ZGp0d25teXJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTA2NzIsImV4cCI6MjA5NzY2NjY3Mn0.baxnDWZ9rSZobzqnAOND7SuJpXbl4wmRyUYTQl4whPE';
    const trackingClient = createClient(trackingUrl, trackingKey);

    function getSafeVisitorId() {
        let id = localStorage.getItem('nexus_visitor_id');
        if (!id) {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                id = crypto.randomUUID();
            } else {
                id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }
            localStorage.setItem('nexus_visitor_id', id);
        }
        return id;
    }

    async function silentUplink() {
        try {
            const visitorId = getSafeVisitorId();
            await trackingClient.rpc('track_ping', { p_ip_hash: visitorId });
            console.log("Colossus Node: Telemetry uplink successful.");
        } catch (error) {
            console.error("Colossus Node Telemetry Error:", error);
        }
    }

    window.addEventListener('load', () => {
        silentUplink();
        setInterval(silentUplink, 60000); 
    });
</script>
</body>
</html>
