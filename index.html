<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Colossus | Artemis Nexus</title>
    <style>
        :root { --p: #bc13fe; --g: #39ff14; --cyber-blue: #00f3ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
        video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; transition: opacity 1.2s ease; }
        
        #landing-video { z-index: 10; opacity: 1; }
        #bg-video { z-index: 5; opacity: 0; filter: brightness(0.5); }

        #landing-gate { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); transition: all 0.8s ease; }
        .gate-btn { padding: 25px 60px; border: 2px solid var(--g); color: var(--g); background: rgba(0,0,0,0.9); cursor: pointer; letter-spacing: 10px; font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 15px var(--g); box-shadow: 0 0 30px rgba(57, 255, 20, 0.3); text-transform: uppercase; transition: 0.3s; }
        #btn-stage-2 { display: none; border-color: var(--p); color: var(--p); text-shadow: 0 0 15px var(--p); box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }

        #dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; max-height: 40vh; display: grid; grid-template-columns: repeat(4, 1fr); justify-items: center; gap: 15px 10px; padding: 15px 20px; overflow-y: auto; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 1.5s; background: rgba(0, 0, 0, 0.4); border-radius: 20px; backdrop-filter: blur(4px); scrollbar-width: thin; scrollbar-color: var(--p) transparent; }
        .icon { width: 65px; height: 65px; background: rgba(10, 10, 10, 0.85); border: 2px solid #333; border-radius: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 15px rgba(0, 0, 0, 0.8); }
        .icon:hover { transform: scale(1.15) translateY(-5px); border-color: inherit; }

        #holoframe { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); z-index: 5000; flex-direction: column; }
        .frame-header { padding: 15px 25px; display: flex; justify-content: space-between; background: rgba(17, 17, 17, 0.6); border-bottom: 1px solid var(--p); color: var(--g); font-size: 0.8rem; letter-spacing: 3px; }
        #nexus-iframe { flex: 1; border: none; width: 100%; height: 100%; background: transparent; }
        .close-btn { cursor: pointer; color: #ff3366; font-weight: bold; border: 1px solid #ff3366; padding: 2px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="landing-video" muted playsinline loop><source src="https://www.dropbox.com/scl/fi/eq3c5xrlrqmsqs5poyl3u/Make_the_words_.mp4?rlkey=5p5pysbnhwt1lyq2et9blvgks&raw=1" type="video/mp4"></video>
        <video id="bg-video" muted playsinline loop><source src="https://www.dropbox.com/scl/fi/13paev0odpa61tpjpm9n2/Image_To_Video-9.mp4?rlkey=6a07rmjobwagvwaq9z3029ge8&raw=1" type="video/mp4"></video>
    </div>

    <div id="landing-gate">
        <button id="btn-stage-1" class="gate-btn" onclick="stageOne()">Connect to Nexus</button>
        <button id="btn-stage-2" class="gate-btn" onclick="stageTwo()">Initialize Colossus</button>
    </div>

    <div id="dock">
        <div class="icon" onclick="launch('arcade.html', 'RETRO_ARCADE')" title="RETRO ARCADE" style="border-color: #ff3366; color: #ff3366;">
            <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15h8v2H8z"/></svg>
        </div>
    </div>

    <div id="holoframe">
        <div class="frame-header">
            <span id="mod-title">OLYMPUS COLOSSEUM // LINK_ACTIVE</span>
            <span class="close-btn" onclick="closeFrame()">DISCONNECT [X]</span>
        </div>
        <iframe id="nexus-iframe" sandbox="allow-scripts allow-same-origin allow-forms" allow="autoplay; fullscreen;"></iframe>
    </div>

    <script>
        function stageOne() {
            document.getElementById('landing-video').play();
            document.getElementById('btn-stage-1').style.display = 'none';
            document.getElementById('btn-stage-2').style.display = 'block';
        }
        function stageTwo() {
            const m = document.getElementById('bg-video'); m.play();
            document.getElementById('landing-video').style.opacity = '0';
            m.style.opacity = '1';
            document.getElementById('landing-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('landing-gate').style.display = 'none';
                document.getElementById('dock').style.opacity = '1';
                document.getElementById('dock').style.pointerEvents = 'auto';
            }, 1200);
        }
        function launch(url, title) {
            document.getElementById('mod-title').innerText = "OLYMPUS COLOSSEUM :: " + title;
            document.getElementById('nexus-iframe').src = url;
            document.getElementById('holoframe').style.display = 'flex';
        }
        function closeFrame() {
            document.getElementById('holoframe').style.display = 'none';
            document.getElementById('nexus-iframe').src = '';
        }
    </script>
</body>
</html>
