<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="google" content="notranslate" />
    <title>OLYMPUS ⚡️ COLOSSEUM</title>
    <meta property="og:title" content="COLOSSEUM CONSOLE" />
    <meta property="og:description" content="[STATION_IDENTIFIED: NEXUS_VORTEX] :: Initializing Colossus Environment. Secure connection established." />
    <meta name="description" content="Secure gateway to the Colosseum. Initialize connection to deploy the Console." />
    <style>
        :root { --p: #bc13fe; --g: #39ff14; --cyber-blue: #00f3ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }

        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; pointer-events: none; }
        video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; transition: opacity 1.2s ease; }
        #landing-video { z-index: 10; opacity: 1; }
        #bg-video { z-index: 5; opacity: 0; filter: brightness(0.5); }

        #landing-gate { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); transition: all 0.8s ease; }
        .gate-btn { padding: 25px 60px; border: 2px solid var(--g); color: var(--g); background: rgba(0,0,0,0.9); cursor: pointer; letter-spacing: 10px; font-weight: bold; font-size: 1.5rem; text-transform: uppercase; transition: 0.3s; }
        .gate-btn:hover { background: var(--g); color: #000; }
        #btn-stage-2 { display: none; border-color: var(--p); color: var(--p); }

        /* Smaller Dock */
        #dock { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; display: grid; grid-template-columns: repeat(4, 1fr); justify-items: center; gap: 8px; padding: 10px; background: rgba(0, 0, 0, 0.5); border-radius: 15px; backdrop-filter: blur(6px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 1.5s; }
        .icon { width: 50px; height: 50px; background: rgba(10, 10, 10, 0.9); border: 1.5px solid #333; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
        .icon svg { width: 24px; height: 24px; pointer-events: none; }
        .icon:hover { transform: scale(1.1); border-color: var(--p); }

        /* Improved Holoframe Layout */
        #holoframe { display: none; position: fixed; top: 10px; left: 10px; right: 10px; bottom: 90px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 5000; flex-direction: column; border: 1px solid var(--p); border-radius: 10px; overflow: hidden; }
        #holoframe.maximized { top: 0; left: 0; right: 0; bottom: 0; border-radius: 0; }
        .frame-header { padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid var(--p); color: var(--g); font-size: 0.7rem; }
        #nexus-iframe { flex: 1; border: none; width: 100%; height: 100%; background: transparent; }
        .btn-grp { display: flex; gap: 10px; }
        .close-btn, .max-btn { cursor: pointer; font-weight: bold; border: 1px solid #ff3366; padding: 2px 8px; border-radius: 4px; }
        .max-btn { border-color: var(--cyber-blue); color: var(--cyber-blue); }
    </style>
</head>
<body>

<div class="video-container">
    <video id="landing-video" muted playsinline loop><source src="https://www.dropbox.com/scl/fi/eq3c5xrlrqmsqs5poyl3u/Make_the_words_.mp4?rlkey=5p5pysbnhwt1lyq2et9blvgks&raw=1" type="video/mp4"></video>
    <video id="bg-video" muted playsinline loop><source src="https://www.dropbox.com/scl/fi/13paev0odpa61tpjpm9n2/Image_To_Video-9.mp4?rlkey=6a07rmjobwagvwaq9z3029ge8&raw=1" type="video/mp4"></video>
</div>

<div id="landing-gate">
    <button id="btn-stage-1" class="gate-btn" onclick="stageOne()">Connect to Nexus</button>
    <button id="btn-stage-2" class="gate-btn" onclick="stageTwo()">Initialize Colossus</button>
</div>

<div id="dock">
    <div class="icon" onclick="launch('stake.html', 'STAKE_VAULT')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h18v18H3V3zm8 14h2v-2h-2v2zm2-4.5V13h-2v-1.5c0-1.1.9-2 2-2 .55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.86-1.28 3.41-3 3.86z"/></svg></div>
    <div class="icon" onclick="launch('https://neon-racer-ecru.vercel.app/', 'NEON_RACER')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
    <div class="icon" onclick="launch('https://merlin-mandates.vercel.app/', 'MERLIN_MANDATES')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12h20c0-5.52-4.48-10-10-10zm-2 11h4v7h-4v-7z"/></svg></div>
    <div class="icon" onclick="launch('https://zeus-v-hades.vercel.app/', 'ZEUS_V_HADES')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-13h4v10h-4z"/></svg></div>
    <div class="icon" onclick="launch('https://starblood.vercel.app/', 'STARBLOOD')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.52 3.58 8.2 8 8.2s8-3.68 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 16c-2.21 0-4-1.79-4-4 0-2.05 1.5-4.22 4-6.5 2.5 2.28 4 4.45 4 6.5 0 2.21-1.79 4-4 4z"/></svg></div>
    <div class="icon" onclick="launch('https://olympian-chess.vercel.app/', 'OLYMPIAN_CHESS')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16h14v2H5zm14-9l-3 4-4-5-4 5-3-4v7h14v-7z"/></svg></div>
    <div class="icon" onclick="launch('https://raptor-rush.vercel.app/', 'RAPTOR_RUSH')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 2 4 8 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8c0-6-4-12-8-12z"/></svg></div>
    <div class="icon" onclick="launch('https://set-air-hockey.vercel.app/', 'SET_AIR_HOCKEY')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-10 10v4h20v-4a10 10 0 0 0-10-10zm0 2a8 8 0 0 1 7.93 7H4.07A8 8 0 0 1 12 4zm-8 9h16v1H4v-1z"/></svg></div>
</div>

<div id="holoframe">
    <div class="frame-header">
        <span id="mod-title">LINK_ACTIVE</span>
        <div class="btn-grp">
            <span class="max-btn" id="max-btn" onclick="toggleMax()">[+]</span>
            <span class="close-btn" onclick="closeFrame()">[X]</span>
        </div>
    </div>
    <iframe id="nexus-iframe" allow="autoplay; fullscreen;"></iframe>
</div>

<script>
    function stageOne() { document.getElementById('btn-stage-1').style.display = 'none'; document.getElementById('btn-stage-2').style.display = 'block'; }
    function stageTwo() {
        document.getElementById('bg-video').play();
        document.getElementById('landing-gate').style.opacity = '0';
        setTimeout(() => { document.getElementById('landing-gate').style.display = 'none'; document.getElementById('dock').style.opacity = '1'; document.getElementById('dock').style.pointerEvents = 'auto'; launch('INJECT_OLYMPUS', 'OLYMPUS COLOSSEUM'); }, 1200);
    }

    function toggleMax() {
        const hf = document.getElementById('holoframe');
        const btn = document.getElementById('max-btn');
        hf.classList.toggle('maximized');
        btn.innerText = hf.classList.contains('maximized') ? '[-]' : '[+]';
    }

    /* INJECTED OLYMPUS CODE BUNDLE - WITH VIDEO HERO */
    const olympusCode = `<!DOCTYPE html>
    <html lang="en" translate="no">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <meta name="google" content="notranslate">
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
            body, html { background-color: transparent; overflow: hidden; width: 100vw; height: 100vh; touch-action: none; }
            #arcade-banner-container { width: 100%; height: 100%; position: relative; }
            #bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.45; z-index: 0; }
            #dk-canvas { position: absolute; top: 0; left: 0; display: block; width: 100%; height: 100%; background-color: transparent; z-index: 1; }
        </style>
    </head>
    <body spellcheck="false">
        <div id="arcade-banner-container">
            <video id="bg-video" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/871o13.mp4" type="video/mp4">
            </video>
            <video id="hero-vid" autoplay loop muted playsinline crossorigin="anonymous" style="display:none;">
                <source src="https://files.catbox.moe/u5yrfx.mp4" type="video/mp4">
            </video>
            <canvas id="dk-canvas"></canvas>
        </div>
        <script>
            const canvas = document.getElementById('dk-canvas');
            const ctx = canvas.getContext('2d');
            const heroVid = document.getElementById('hero-vid');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initGirders();
            }
            window.addEventListener('resize', resize);

            const girders = [];
            const barrels = [];
            let rayAngle = 0;

            function initGirders() {
                girders.length = 0;
                const rowHeight = canvas.height / 3.5;
                for (let i = 0; i < 3; i++) {
                    const slantDirection = i % 2 === 0 ? 1 : -1;
                    girders.push({
                        yLeft: (i + 1) * rowHeight + (slantDirection === 1 ? -25 : 25),
                        yRight: (i + 1) * rowHeight + (slantDirection === 1 ? 25 : -25),
                        level: i
                    });
                }
            }

            const ape = { x: 100, y: 0, throwTimer: 0 };
            const hero = {
                x: 100, width: 36, height: 36, speed: 3, direction: 1, /* Tweaked width/height for video ratio */
                isJumping: false, yVelocity: 0, gravity: 0.6,
                jumpStrength: -12, isDead: false, deadTimer: 0
            };

            function getGirderY(x, girder) {
                const slope = (girder.yRight - girder.yLeft) / canvas.width;
                return girder.yLeft + slope * x;
            }

            function drawRays() {
                ctx.save();
                ctx.translate(canvas.width / 2, -50);
                rayAngle += 0.005; 
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, 'rgba(255, 255, 240, 0.10)'); 
                gradient.addColorStop(1, 'rgba(255, 255, 240, 0)');
                ctx.rotate(Math.sin(rayAngle) * 0.3);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(-250, canvas.height + 100); ctx.lineTo(250, canvas.height + 100);
                ctx.fill(); ctx.restore();
            }

            function drawGirders() {
                ctx.lineCap = 'butt';
                girders.forEach(g => {
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.6)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 8;
                    const grad = ctx.createLinearGradient(0, g.yLeft - 10, 0, g.yLeft + 10);
                    grad.addColorStop(0, '#e63946'); grad.addColorStop(0.5, '#a81c25'); grad.addColorStop(1, '#5e0b12'); 
                    ctx.lineWidth = 16; ctx.strokeStyle = grad;
                    ctx.beginPath(); ctx.moveTo(0, g.yLeft); ctx.lineTo(canvas.width, g.yRight); ctx.stroke();
                    ctx.shadowColor = 'transparent'; 
                    ctx.lineWidth = 2; ctx.strokeStyle = '#ff9999';
                    ctx.beginPath(); ctx.moveTo(0, g.yLeft - 7); ctx.lineTo(canvas.width, g.yRight - 7); ctx.stroke();
                });
            }

            function drawEnhancedApe() {
                ape.y = girders[0].yLeft - 85; 
                const centerX = ape.x + 35;
                const centerY = ape.y + 45;
                const furGrad = ctx.createRadialGradient(centerX - 10, centerY - 10, 5, centerX, centerY, 50);
                furGrad.addColorStop(0, '#5C4033'); furGrad.addColorStop(1, '#2B170B'); 
                ctx.fillStyle = furGrad; ctx.shadowColor = 'rgba(0, 0, 0, 0.5)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 5;
                
                ctx.beginPath(); ctx.arc(centerX, centerY + 10, 36, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(centerX, centerY - 15, 30, 0, Math.PI * 2); ctx.fill();
                ctx.shadowColor = 'transparent'; 
                ctx.beginPath(); ctx.arc(centerX, centerY - 45, 20, 0, Math.PI * 2); ctx.fill();
                
                ctx.fillStyle = '#D2B48C'; ctx.beginPath(); ctx.ellipse(centerX, centerY - 42, 18, 14, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(centerX - 7, centerY - 46, 2.5, 0, Math.PI * 2); ctx.arc(centerX + 7, centerY - 46, 2.5, 0, Math.PI * 2); ctx.fill();
                
                ctx.strokeStyle = '#2B170B'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(centerX - 14, centerY - 50); ctx.lineTo(centerX - 3, centerY - 47); ctx.moveTo(centerX + 14, centerY - 50); ctx.lineTo(centerX + 3, centerY - 47); ctx.stroke();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(centerX, centerY - 36, 8, 0, Math.PI, false); ctx.stroke();
                
                ctx.fillStyle = '#8B5A2B'; ctx.beginPath(); ctx.arc(centerX - 16, centerY - 12, 16, 0, Math.PI * 2); ctx.arc(centerX + 16, centerY - 12, 16, 0, Math.PI * 2); ctx.fill();
                
                ctx.lineWidth = 20; ctx.strokeStyle = furGrad; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(centerX - 32, centerY - 25); ctx.lineTo(centerX - 50, centerY + 25); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(centerX + 32, centerY - 25);
                if (ape.throwTimer > 0) { ctx.lineTo(centerX + 65, centerY - 45); } else { ctx.lineTo(centerX + 50, centerY + 25); }
                ctx.stroke();
            }

            function handleBarrels() {
                if (Math.random() < 0.02 && ape.throwTimer <= 0) {
                    barrels.push({ x: ape.x + 85, level: 0, speed: 3.5, radius: 14, rotation: 0 });
                    ape.throwTimer = 35; 
                }
                if (ape.throwTimer > 0) ape.throwTimer--;
                for (let i = barrels.length - 1; i >= 0; i--) {
                    const b = barrels[i];
                    const girder = girders[b.level];
                    const direction = b.level % 2 === 0 ? 1 : -1;
                    b.x += b.speed * direction; b.rotation += 0.15 * direction;
                    const currentY = getGirderY(b.x, girder);

                    ctx.save(); ctx.translate(b.x, currentY - b.radius - 8); ctx.rotate(b.rotation);
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.5)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 4;
                    const woodGrad = ctx.createRadialGradient(-b.radius/3, -b.radius/3, 2, 0, 0, b.radius);
                    woodGrad.addColorStop(0, '#d4a373'); woodGrad.addColorStop(1, '#8b5a2b'); 
                    ctx.fillStyle = woodGrad; ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowColor = 'transparent'; 
                    ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(0, 0, b.radius - 3, -Math.PI/2.5, Math.PI/2.5); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, b.radius - 3, Math.PI - Math.PI/2.5, Math.PI + Math.PI/2.5); ctx.stroke();
                    ctx.restore();

                    if ((direction === 1 && b.x > canvas.width - b.radius) || (direction === -1 && b.x < b.radius)) {
                        if (b.level < girders.length - 1) {
                            b.level++; b.x = direction === 1 ? canvas.width - b.radius - 2 : b.radius + 2; 
                        } else { barrels.splice(i, 1); }
                    }
                }
            }

            function handleHero() {
                const bottomGirder = girders[girders.length - 1];
                const baseHeroY = getGirderY(hero.x, bottomGirder) - hero.height - 10;
                let currentHeroY = baseHeroY;

                if (hero.isDead) {
                    hero.deadTimer--;
                    ctx.fillStyle = '#ff4d4d';
                    ctx.beginPath(); ctx.roundRect(hero.x - 5, baseHeroY + hero.height - 8, hero.width + 10, 8, [2]); ctx.fill();
                    if (hero.deadTimer <= 0) { hero.isDead = false; hero.x = 100; }
                    return; 
                }

                hero.x += hero.speed * hero.direction;
                if (hero.x > canvas.width + hero.width) { hero.x = -hero.width; } 
                else if (hero.x < -hero.width) { hero.x = canvas.width + hero.width; }

                for (let i = 0; i < barrels.length; i++) {
                    const b = barrels[i];
                    if (b.level === girders.length - 1) {
                        const barrelY = getGirderY(b.x, bottomGirder) - b.radius - 8;
                        const dist = Math.hypot(b.x - (hero.x + hero.width/2), barrelY - (currentHeroY + hero.height/2));
                        if (dist < b.radius + hero.width/2 + 5) { hero.isDead = true; hero.deadTimer = 90; break; }
                    }
                }

                if (!hero.isJumping && !hero.isDead) {
                    const dangerZone = barrels.find(b => b.level === girders.length - 1 && Math.abs(b.x - hero.x) < 90 && Math.abs(b.x - hero.x) > 60);
                    if (dangerZone) { if (Math.random() > 0.15) { hero.isJumping = true; hero.yVelocity = hero.jumpStrength; } }
                }

                let yOffset = 0;
                if (hero.isJumping) { hero.yVelocity += hero.gravity; yOffset = hero.yVelocity; }
                currentHeroY = baseHeroY + yOffset;
                if (currentHeroY >= baseHeroY && hero.isJumping) { currentHeroY = baseHeroY; hero.isJumping = false; hero.yVelocity = 0; }

                // --- DRAW VIDEO HERO ---
                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)'; 
                ctx.shadowBlur = 4; 
                ctx.shadowOffsetY = 3;
                
                ctx.save();
                if (hero.direction === -1) {
                    ctx.translate(hero.x + hero.width, 0);
                    ctx.scale(-1, 1);
                    if (heroVid.readyState >= 2) ctx.drawImage(heroVid, 0, currentHeroY, hero.width, hero.height);
                } else {
                    if (heroVid.readyState >= 2) ctx.drawImage(heroVid, hero.x, currentHeroY, hero.width, hero.height);
                }
                ctx.restore();
                
                ctx.shadowColor = 'transparent';
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (girders.length === 0) initGirders();
                drawRays(); drawGirders(); drawEnhancedApe(); handleBarrels(); handleHero();
                requestAnimationFrame(animate);
            }

            resize(); animate();
        <\/script>
    </body>
    </html>`;

    function launch(url, title) {
        const hf = document.getElementById('holoframe');
        const ifr = document.getElementById('nexus-iframe');
        document.getElementById('mod-title').innerText = "COLOSSUS_LINK :: " + title;
        
        if (url === 'INJECT_OLYMPUS') {
            ifr.removeAttribute('src');
            ifr.srcdoc = olympusCode;
        } else {
            ifr.removeAttribute('srcdoc'); 
            ifr.src = url; 
        }
        
        hf.style.display = 'flex';
    }

    function closeFrame() {
        const hf = document.getElementById('holoframe');
        const ifr = document.getElementById('nexus-iframe');
        hf.style.display = 'none';
        
        ifr.removeAttribute('srcdoc');
        ifr.removeAttribute('src'); 
    }
</script>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const trackingUrl = 'https://ezfwzqxwafvdjtwnmyrx.supabase.co';
    const trackingKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6Znd6cXh3YWZ2ZGp0d25teXJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTA2NzIsImV4cCI6MjA5NzY2NjY3Mn0.baxnDWZ9rSZobzqnAOND7SuJpXbl4wmRyUYTQl4whPE';
    const trackingClient = createClient(trackingUrl, trackingKey);

    function getSafeVisitorId() {
        let id = localStorage.getItem('nexus_visitor_id');
        if (!id) {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                id = crypto.randomUUID();
            } else {
                id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }
            localStorage.setItem('nexus_visitor_id', id);
        }
        return id;
    }

    async function silentUplink() {
        try {
            const visitorId = getSafeVisitorId();
            await trackingClient.rpc('track_ping', { p_ip_hash: visitorId });
            console.log("Colossus Node: Telemetry uplink successful.");
        } catch (error) {
            console.error("Colossus Node Telemetry Error:", error);
        }
    }

    window.addEventListener('load', () => {
        silentUplink();
        setInterval(silentUplink, 60000); 
    });
</script>
</body>
</html>
